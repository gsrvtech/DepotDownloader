name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v3.4.0)'
        required: true
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build:
    name: Build ${{ matrix.artifact-name }}
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - runs-on: windows-latest
            runtime: win-x64
            artifact-name: DepotDownloader-windows-x64
          - runs-on: windows-latest
            runtime: win-arm64
            artifact-name: DepotDownloader-windows-arm64
          - runs-on: ubuntu-latest
            runtime: linux-x64
            artifact-name: DepotDownloader-linux-x64
          - runs-on: ubuntu-latest
            runtime: linux-arm
            artifact-name: DepotDownloader-linux-arm
          - runs-on: ubuntu-latest
            runtime: linux-arm64
            artifact-name: DepotDownloader-linux-arm64
          - runs-on: macos-latest
            runtime: osx-x64
            artifact-name: DepotDownloader-macos-x64
          - runs-on: macos-14
            runtime: osx-arm64
            artifact-name: DepotDownloader-macos-arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-dotnet@v5

      - name: Publish ${{ matrix.runtime }}
        run: dotnet publish DepotDownloader/DepotDownloader.csproj -c Release -p:PublishSingleFile=true -p:DebugType=embedded --self-contained --runtime ${{ matrix.runtime }} --output publish /p:ContinuousIntegrationBuild=true

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: publish
          if-no-files-found: error

  build-framework:
    name: Build framework-dependent
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-dotnet@v5

      - name: Publish framework-dependent
        run: dotnet publish DepotDownloader/DepotDownloader.csproj -c Release --output publish /p:ContinuousIntegrationBuild=true

      - uses: actions/upload-artifact@v7
        with:
          name: DepotDownloader-framework
          path: publish
          if-no-files-found: error

  release:
    needs: [build, build-framework]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          notes=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$notes" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create release archives
        run: |
          set -eux
          mkdir release
          chmod +x artifacts/DepotDownloader-linux-x64/DepotDownloader
          chmod +x artifacts/DepotDownloader-linux-arm/DepotDownloader
          chmod +x artifacts/DepotDownloader-linux-arm64/DepotDownloader
          chmod +x artifacts/DepotDownloader-macos-x64/DepotDownloader
          chmod +x artifacts/DepotDownloader-macos-arm64/DepotDownloader
          zip -9j release/DepotDownloader-framework.zip       artifacts/DepotDownloader-framework/*
          zip -9j release/DepotDownloader-windows-x64.zip    artifacts/DepotDownloader-windows-x64/*
          zip -9j release/DepotDownloader-windows-arm64.zip  artifacts/DepotDownloader-windows-arm64/*
          zip -9j release/DepotDownloader-linux-x64.zip      artifacts/DepotDownloader-linux-x64/*
          zip -9j release/DepotDownloader-linux-arm.zip      artifacts/DepotDownloader-linux-arm/*
          zip -9j release/DepotDownloader-linux-arm64.zip    artifacts/DepotDownloader-linux-arm64/*
          zip -9j release/DepotDownloader-macos-x64.zip      artifacts/DepotDownloader-macos-x64/*
          zip -9j release/DepotDownloader-macos-arm64.zip    artifacts/DepotDownloader-macos-arm64/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: DepotDownloader ${{ inputs.tag || github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: true
          prerelease: ${{ inputs.prerelease == true }}
          files: release/*
